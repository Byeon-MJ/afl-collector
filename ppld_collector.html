<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PPLD Data Collector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            width: 100vw;
        }
        body.no-scroll { overflow: hidden; height: 100vh; }

        /* --- Setup Screen --- */
        #setup-screen {
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px 60px; text-align: center;
            min-height: 100vh; overflow-y: auto;
        }
        #setup-screen h1 { font-size: 1.5em; margin-bottom: 6px; }
        .subtitle { color: #aaa; font-size: 0.85em; margin-bottom: 20px; }
        .option-group {
            width: 100%; max-width: 400px; margin-bottom: 12px; text-align: left;
        }
        .option-group label {
            display: block; font-size: 0.85em; color: #999; margin-bottom: 4px;
        }
        .option-group select, .option-group input {
            width: 100%; padding: 10px; border: 1px solid #444;
            border-radius: 8px; background: #222; color: #eee; font-size: 1em;
        }
        .option-group input[type=checkbox] { width: auto; margin-right: 8px; }
        .checkbox-row { display: flex; align-items: center; padding: 10px 0; }
        .btn {
            padding: 14px 40px; border: none; border-radius: 12px;
            font-size: 1.1em; font-weight: 600; cursor: pointer;
            margin: 8px; transition: all 0.2s;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-success { background: #16a34a; color: white; }
        .btn-secondary { background: #444; color: white; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #model-status {
            margin-top: 12px; padding: 10px; background: #1a1a2e;
            border-radius: 8px; font-size: 0.8em; text-align: left;
            width: 100%; max-width: 400px;
        }

        /* --- Camera Screen --- */
        #camera-screen {
            display: none; position: relative; width: 100vw; height: 100vh;
        }
        #video {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
        }
        #overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }

        /* HUD overlay */
        #hud {
            position: absolute; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.65); padding: 10px 14px;
            font-size: 0.75em; z-index: 10;
        }
        #hud .row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        #hud .val { color: #4ade80; font-weight: 600; }
        #hud .label { color: #aaa; }

        /* Progress bar */
        #progress-container {
            position: absolute; bottom: 100px; left: 20px; right: 20px;
            height: 24px; background: rgba(255,255,255,0.1);
            border-radius: 12px; overflow: hidden; z-index: 10;
        }
        #progress-bar {
            height: 100%; width: 0%; background: #22c55e;
            border-radius: 12px; transition: width 0.1s;
        }
        #progress-text {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7em; color: white; font-weight: 600;
        }

        /* Guide arrow */
        #guide {
            position: absolute; bottom: 140px; left: 0; right: 0;
            text-align: center; font-size: 1.2em; font-weight: 700;
            color: #4ade80; z-index: 10;
        }

        /* Session info bar */
        #session-bar {
            position: absolute; bottom: 50px; left: 0; right: 0;
            text-align: center; z-index: 10;
        }
        #session-bar .info { color: #aaa; font-size: 0.8em; margin-bottom: 8px; }

        /* Control buttons */
        #controls {
            position: absolute; bottom: 10px; left: 0; right: 0;
            display: flex; justify-content: center; gap: 10px; z-index: 10;
        }
        #controls .btn { padding: 10px 24px; font-size: 0.9em; }

        /* --- Download Screen --- */
        #download-screen {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; padding: 30px;
            text-align: center;
        }
        #download-screen h2 { margin-bottom: 15px; }
        #summary { color: #aaa; margin-bottom: 20px; font-size: 0.9em; }
        #summary p { margin-bottom: 6px; }
        #summary .detail { font-size: 0.8em; color: #666; margin-top: 8px; }
    </style>
</head>
<body>

<!-- ==================== Setup Screen ==================== -->
<div id="setup-screen">
    <h1>PPLD Data Collector</h1>
    <div class="subtitle">Perspective Parallax Liveness — Tier 1 + Tier 2 수집</div>

    <div style="margin-bottom:16px;">
        <a href="index.html" style="color:#4fc3f7; text-decoration:none; font-size:0.85em; border:1px solid #4fc3f7; padding:6px 14px; border-radius:20px;">&larr; AFL Collector (Flash)</a>
    </div>

    <div class="option-group">
        <label>수집 유형</label>
        <select id="collect-type">
            <option value="live">Live (실제 얼굴)</option>
            <option value="screen_replay">Spoof: Screen Replay</option>
            <option value="print">Spoof: Print</option>
            <option value="3d_mask">Spoof: 3D Mask</option>
        </select>
    </div>

    <div class="option-group">
        <label>세션 수</label>
        <input type="number" id="session-count" value="10" min="1" max="200">
    </div>

    <div class="option-group">
        <label>접근 거리 목표 (cm)</label>
        <input type="number" id="target-dz" value="8" min="3" max="20" step="1">
    </div>

    <div class="option-group">
        <label>최대 녹화 시간 (초)</label>
        <input type="number" id="max-duration" value="8" min="3" max="20" step="1">
    </div>

    <div class="option-group">
        <div class="checkbox-row">
            <input type="checkbox" id="tier2-enabled" checked>
            <label for="tier2-enabled" style="margin:0">Tier 2: Landmark features 수집 (478-point Face Mesh)</label>
        </div>
    </div>

    <button class="btn btn-primary" onclick="startCollector()">카메라 시작</button>

    <div id="model-status"></div>
</div>

<!-- ==================== Camera Screen ==================== -->
<div id="camera-screen">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>

    <div id="hud">
        <div class="row"><span class="label">Area Ratio</span><span class="val" id="hud-area">1.0000</span></div>
        <div class="row"><span class="label">Sub-bbox Diff</span><span class="val" id="hud-subbbox">1.0000</span></div>
        <div class="row"><span class="label">Est. dZ</span><span class="val" id="hud-dz">0.0 cm</span></div>
        <div class="row"><span class="label">Direction</span><span class="val" id="hud-dir">-</span></div>
        <div class="row"><span class="label">Tier</span><span class="val" id="hud-tier">-</span></div>
        <div class="row"><span class="label">Tier1 Score</span><span class="val" id="hud-t1">-</span></div>
        <div class="row"><span class="label">FNUS</span><span class="val" id="hud-fnus">-</span></div>
        <div class="row"><span class="label">CDS</span><span class="val" id="hud-cds">-</span></div>
        <div class="row"><span class="label">DMS</span><span class="val" id="hud-dms">-</span></div>
        <div class="row"><span class="label">SOS</span><span class="val" id="hud-sos">-</span></div>
    </div>

    <div id="guide">카메라에 천천히 다가가세요 →→→</div>

    <div id="progress-container">
        <div id="progress-bar"></div>
        <div id="progress-text">0%</div>
    </div>

    <div id="session-bar">
        <div class="info" id="session-info">세션 0/0 | 유형: live</div>
    </div>

    <div id="controls">
        <button class="btn btn-primary" id="btn-start" onclick="startSession()">녹화 시작</button>
        <button class="btn btn-secondary" id="btn-skip" onclick="skipSession()" style="display:none">건너뛰기</button>
        <button class="btn btn-danger" id="btn-stop" onclick="stopCollection()" style="display:none">종료</button>
    </div>
</div>

<!-- ==================== Download Screen ==================== -->
<div id="download-screen">
    <h2>수집 완료</h2>
    <div id="summary"></div>
    <button class="btn btn-success" onclick="downloadData()">데이터 다운로드 (ZIP)</button>
    <button class="btn btn-secondary" onclick="location.reload()" style="margin-top:10px">새로 시작</button>
</div>

<!-- JSZip -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script type="module">
// ============================================================
// MediaPipe Face Landmarker — CDN import
// ============================================================
import {
    FaceLandmarker,
    FilesetResolver,
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs";

// ============================================================
// Landmark Constants (matching Python landmark_provider.py)
// ============================================================
const NOSE_TIP = 1;
const NOSE_BRIDGE = [6, 197, 195, 5];
const NOSE_REGION = [1, 2, 98, 327, 6, 197, 195, 5];
const JAWLINE = [10, 338, 297, 332, 284, 251, 389, 356, 454, 323, 361, 288, 397, 365, 379, 378, 400];
const LEFT_EAR_REGION = [234, 127, 162, 21, 54];
const RIGHT_EAR_REGION = [454, 356, 389, 251, 284];
const FACE_CENTER = [1, 6, 168, 197, 195, 5, 4];

// ============================================================
// FAGR Tracker (ported from Python fagr_tracker.py)
// ============================================================
class FAGRTracker {
    constructor(maxFrames = 60, zRefCm = 30.0, tier2DzThreshold = 5.0) {
        this.buffer = [];
        this.maxFrames = maxFrames;
        this.zRefCm = zRefCm;
        this.tier2DzThreshold = tier2DzThreshold;
        this.reference = null;
    }

    update(bbox) {
        const entry = {
            x: bbox.x, y: bbox.y, w: bbox.w, h: bbox.h,
            area: bbox.w * bbox.h,
            timestamp: performance.now() / 1000.0,
        };
        this.buffer.push(entry);
        if (this.buffer.length > this.maxFrames) this.buffer.shift();
        if (!this.reference) this.reference = entry;
        return this._computeState();
    }

    getState() { return this._computeState(); }

    _computeState() {
        if (this.buffer.length < 2 || !this.reference) {
            return {
                areaRatio: 1.0, subBboxDiff: 1.0, direction: 'stationary',
                estimatedDzCm: 0.0, durationMs: 0, nFrames: this.buffer.length,
                areaVelocity: 0.0, sufficientForTier2: false,
            };
        }
        const cur = this.buffer[this.buffer.length - 1];
        const ref = this.reference;
        const areaRatio = cur.area / Math.max(ref.area, 1);
        const subBboxDiff = this._computeSubBboxDiff();
        const direction = this._classifyMotion(ref, cur, areaRatio);
        const dZ = this.zRefCm * (1.0 - 1.0 / Math.sqrt(Math.max(areaRatio, 0.01)));
        const durationMs = (cur.timestamp - ref.timestamp) * 1000.0;
        const areaVelocity = durationMs > 0 ? (areaRatio - 1.0) / (durationMs / 1000.0) : 0;

        return {
            areaRatio, subBboxDiff, direction, estimatedDzCm: dZ, durationMs,
            nFrames: this.buffer.length, areaVelocity,
            sufficientForTier2: Math.abs(dZ) >= this.tier2DzThreshold,
        };
    }

    _computeSubBboxDiff() {
        if (this.buffer.length < 5 || !this.reference) return 1.0;
        const ref = this.reference;
        const cur = this.buffer[this.buffer.length - 1];
        const refThirdW = ref.w / 3.0;
        const curThirdW = cur.w / 3.0;
        const centerGrowth = (curThirdW * cur.h) / Math.max(refThirdW * ref.h, 1);
        const edgeGrowth = (2 * curThirdW * cur.h) / Math.max(2 * refThirdW * ref.h, 1);
        return edgeGrowth < 0.01 ? 1.0 : centerGrowth / edgeGrowth;
    }

    _classifyMotion(ref, cur, areaRatio) {
        const areaChange = Math.abs(areaRatio - 1.0);
        const refCx = ref.x + ref.w / 2, refCy = ref.y + ref.h / 2;
        const curCx = cur.x + cur.w / 2, curCy = cur.y + cur.h / 2;
        const lateralDisp = Math.sqrt((curCx - refCx) ** 2 + (curCy - refCy) ** 2);
        const faceSize = Math.max(ref.w, ref.h, 1);
        const normLateral = lateralDisp / faceSize;

        const hasArea = areaChange > 0.03;
        const hasLateral = normLateral > 0.15;
        const isApproach = areaRatio > 1.03;

        if (!hasArea && !hasLateral) return 'stationary';
        if (isApproach && hasLateral) return 'approach_lateral';
        if (isApproach) return 'approach';
        if (areaRatio < 0.97) return 'retreat';
        if (hasLateral) return 'lateral';
        return 'stationary';
    }

    reset() { this.buffer = []; this.reference = null; }
}

// ============================================================
// Landmark Feature Extractor (ported from Python landmark_features.py)
// ============================================================
class LandmarkFeatureExtractor {
    constructor(earConfThreshold = 0.7) {
        this.earConfThreshold = earConfThreshold;
    }

    extract(lmStart, lmEnd, imgW, imgH) {
        const start = lmStart.map(l => [l.x * imgW, l.y * imgH]);
        const end = lmEnd.map(l => [l.x * imgW, l.y * imgH]);
        return {
            fnus: this._computeFNUS(start, end),
            cds: this._computeCDS(start, end),
            dms: this._computeDMS(start, end),
            sos: this._computeSOS(start, end, lmStart, lmEnd),
        };
    }

    _computeFNUS(start, end) {
        const disps = start.map((s, i) => [end[i][0] - s[0], end[i][1] - s[1]]);
        let cx = 0, cy = 0;
        for (const idx of FACE_CENTER) { cx += disps[idx][0]; cy += disps[idx][1]; }
        cx /= FACE_CENTER.length; cy /= FACE_CENTER.length;
        const centerMag = Math.sqrt(cx * cx + cy * cy);
        if (centerMag < 1.0) return 0.0;

        const mags = disps.map(d => {
            const rx = d[0] / (centerMag + 1e-8), ry = d[1] / (centerMag + 1e-8);
            return Math.sqrt(rx * rx + ry * ry);
        });
        const mean = mags.reduce((a, b) => a + b, 0) / mags.length;
        if (mean < 1e-8) return 0.0;
        const std = Math.sqrt(mags.reduce((a, m) => a + (m - mean) ** 2, 0) / mags.length);
        return std / mean;
    }

    _computeCDS(start, end) {
        return this._procrustesDistance(
            JAWLINE.map(i => start[i]), JAWLINE.map(i => end[i])
        );
    }

    _computeDMS(start, end) {
        const noseScale = this._computeScaleChange(start, end, NOSE_REGION);
        const earScale = this._computeScaleChange(start, end, [...LEFT_EAR_REGION, ...RIGHT_EAR_REGION]);
        return earScale < 1e-6 ? 1.0 : noseScale / earScale;
    }

    _computeSOS(start, end, lmStartRaw, lmEndRaw) {
        const earIndices = [...LEFT_EAR_REGION, ...RIGHT_EAR_REGION];
        const startVis = earIndices.map(i => lmStartRaw[i].visibility ?? 1.0);
        const endVis = earIndices.map(i => lmEndRaw[i].visibility ?? 1.0);
        const avgStartVis = startVis.reduce((a,b) => a+b, 0) / startVis.length;
        const avgEndVis = endVis.reduce((a,b) => a+b, 0) / endVis.length;
        if (avgStartVis < this.earConfThreshold || avgEndVis < this.earConfThreshold) return null;
        return this._earFaceRatio(start) - this._earFaceRatio(end);
    }

    _earFaceRatio(pts) {
        const leftC = this._centroid(LEFT_EAR_REGION.map(i => pts[i]));
        const rightC = this._centroid(RIGHT_EAR_REGION.map(i => pts[i]));
        const earSpread = Math.sqrt((rightC[0]-leftC[0])**2 + (rightC[1]-leftC[1])**2);
        const jaw = JAWLINE.map(i => pts[i]);
        const faceWidth = Math.max(...jaw.map(p => p[0])) - Math.min(...jaw.map(p => p[0]));
        return faceWidth < 1e-6 ? 0 : earSpread / faceWidth;
    }

    _centroid(pts) {
        return [
            pts.reduce((a, p) => a + p[0], 0) / pts.length,
            pts.reduce((a, p) => a + p[1], 0) / pts.length,
        ];
    }

    _computeScaleChange(start, end, indices) {
        const ptsS = indices.map(i => start[i]), ptsE = indices.map(i => end[i]);
        const sS = this._avgPairwiseDist(ptsS), sE = this._avgPairwiseDist(ptsE);
        return sS < 1e-6 ? 1.0 : sE / sS;
    }

    _avgPairwiseDist(pts) {
        if (pts.length < 2) return 1.0;
        let sum = 0, count = 0;
        for (let i = 0; i < pts.length; i++)
            for (let j = i + 1; j < pts.length; j++) {
                sum += Math.sqrt((pts[i][0]-pts[j][0])**2 + (pts[i][1]-pts[j][1])**2);
                count++;
            }
        return count > 0 ? sum / count : 1.0;
    }

    _procrustesDistance(ptsA, ptsB) {
        const a = this._procrustesNormalize(ptsA);
        const b = this._procrustesNormalize(ptsB);
        // 2x2 optimal rotation via atan2
        let m00=0, m01=0, m10=0, m11=0;
        for (let i = 0; i < a.length; i++) {
            m00 += a[i][0]*b[i][0]; m01 += a[i][0]*b[i][1];
            m10 += a[i][1]*b[i][0]; m11 += a[i][1]*b[i][1];
        }
        const theta = Math.atan2(m10 - m01, m00 + m11);
        const cosT = Math.cos(theta), sinT = Math.sin(theta);
        let dist = 0;
        for (let i = 0; i < a.length; i++) {
            const rx = a[i][0]*cosT - a[i][1]*sinT;
            const ry = a[i][0]*sinT + a[i][1]*cosT;
            dist += (rx-b[i][0])**2 + (ry-b[i][1])**2;
        }
        return Math.sqrt(dist / a.length);
    }

    _procrustesNormalize(pts) {
        const cx = pts.reduce((a,p) => a+p[0], 0)/pts.length;
        const cy = pts.reduce((a,p) => a+p[1], 0)/pts.length;
        const centered = pts.map(p => [p[0]-cx, p[1]-cy]);
        let norm = 0;
        for (const p of centered) norm += p[0]*p[0] + p[1]*p[1];
        norm = Math.sqrt(norm);
        if (norm < 1e-8) return centered;
        return centered.map(p => [p[0]/norm, p[1]/norm]);
    }
}

// ============================================================
// PPLD Scorer (ported from Python ppld_scorer.py)
// ============================================================
function sigmoidMap(value, center, scale) {
    const z = Math.max(-20, Math.min(20, scale * (value - center)));
    return 1.0 / (1.0 + Math.exp(-z));
}

function scoreTier1(state) {
    if (state.subBboxDiff <= 1.0) return null;
    const raw = (state.subBboxDiff - 1.0) / 0.05;
    return 0.5 + 0.35 * Math.min(raw, 1.0);
}

function scoreTier2(state, fnus, cds, dms, sos) {
    const w = { fagr_sub_bbox: 0.25, fnus: 0.30, cds: 0.20, dms: 0.15, sos: 0.10 };
    const features = {
        fagr_sub_bbox: sigmoidMap(state.subBboxDiff, 1.02, 50),
        fnus: sigmoidMap(fnus, 0.05, 30),
        cds: sigmoidMap(cds, 0.003, 500),
        dms: sigmoidMap(dms - 1.0, 0.03, 50),
    };
    if (sos !== null && sos !== undefined) {
        features.sos = sigmoidMap(sos, 0.01, 100);
    } else {
        delete w.sos;
        const total = Object.values(w).reduce((a, b) => a + b, 0);
        for (const k in w) w[k] /= total;
    }
    let score = 0;
    for (const k in features) score += (w[k] || 0) * features[k];
    return Math.max(0, Math.min(1, score));
}

// ============================================================
// Application State
// ============================================================
let faceLandmarker = null;
let videoEl, overlayCanvas, overlayCtx;
let collectType = 'live';
let totalSessions = 10;
let targetDzCm = 8;
let maxDurationSec = 8;
let tier2Enabled = true;
let currentSessionIdx = 0;
let isRecording = false;
let collectedSessions = [];
let animFrameId = null;

// Per-session state
let fagrTracker = null;
const landmarkExtractor = new LandmarkFeatureExtractor();
let sessionTrajectory = [];
let sessionStartTime = 0;
let startLandmarks = null;
let endLandmarks = null;
let startFrame = null;
let endFrame = null;

// ============================================================
// Initialization
// ============================================================
async function startCollector() {
    collectType = document.getElementById('collect-type').value;
    totalSessions = parseInt(document.getElementById('session-count').value);
    targetDzCm = parseFloat(document.getElementById('target-dz').value);
    maxDurationSec = parseFloat(document.getElementById('max-duration').value);
    tier2Enabled = document.getElementById('tier2-enabled').checked;

    const statusEl = document.getElementById('model-status');
    statusEl.textContent = 'MediaPipe Face Landmarker 로딩 중...';

    try {
        const vision = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );
        faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                delegate: "GPU",
            },
            runningMode: "VIDEO", numFaces: 1,
            outputFacialTransformationMatrixes: false, outputFaceBlendshapes: false,
        });
        statusEl.textContent = '✓ MediaPipe 로드 완료 (GPU)';
    } catch (e) {
        try {
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
            );
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task",
                    delegate: "CPU",
                },
                runningMode: "VIDEO", numFaces: 1,
            });
            statusEl.textContent = '✓ MediaPipe 로드 완료 (CPU fallback)';
        } catch (e2) {
            statusEl.textContent = '✗ MediaPipe 로드 실패: ' + e2.message;
            return;
        }
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
        });
        videoEl = document.getElementById('video');
        videoEl.srcObject = stream;
        await videoEl.play();

        overlayCanvas = document.getElementById('overlay');
        overlayCtx = overlayCanvas.getContext('2d');
        videoEl.addEventListener('loadedmetadata', function() {
            overlayCanvas.width = videoEl.videoWidth;
            overlayCanvas.height = videoEl.videoHeight;
        });

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('camera-screen').style.display = 'block';
        document.body.classList.add('no-scroll');
        detectLoop();
    } catch (e) {
        statusEl.textContent = '✗ 카메라 접근 실패: ' + e.message;
    }
}
window.startCollector = startCollector;

// ============================================================
// Detection Loop
// ============================================================
let lastDetectTime = 0;

function detectLoop() {
    if (!videoEl || videoEl.paused || videoEl.ended) {
        animFrameId = requestAnimationFrame(detectLoop);
        return;
    }

    const now = performance.now();
    if (now - lastDetectTime < 33) {
        animFrameId = requestAnimationFrame(detectLoop);
        return;
    }
    lastDetectTime = now;

    const results = faceLandmarker.detectForVideo(videoEl, now);
    const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
    overlayCanvas.width = vw;
    overlayCanvas.height = vh;
    overlayCtx.clearRect(0, 0, vw, vh);

    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
        const landmarks = results.faceLandmarks[0];
        const bbox = landmarksToBbox(landmarks, vw, vh);

        // Draw bbox
        overlayCtx.strokeStyle = '#00ff88';
        overlayCtx.lineWidth = 2;
        overlayCtx.strokeRect(bbox.x, bbox.y, bbox.w, bbox.h);

        // Draw sub-bbox thirds
        const thirdW = bbox.w / 3;
        overlayCtx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
        overlayCtx.lineWidth = 1;
        overlayCtx.beginPath();
        overlayCtx.moveTo(bbox.x + thirdW, bbox.y);
        overlayCtx.lineTo(bbox.x + thirdW, bbox.y + bbox.h);
        overlayCtx.moveTo(bbox.x + 2*thirdW, bbox.y);
        overlayCtx.lineTo(bbox.x + 2*thirdW, bbox.y + bbox.h);
        overlayCtx.stroke();

        // Draw key landmarks
        if (tier2Enabled) {
            overlayCtx.fillStyle = 'rgba(0, 200, 255, 0.4)';
            for (const idx of NOSE_REGION) {
                overlayCtx.beginPath();
                overlayCtx.arc(landmarks[idx].x*vw, landmarks[idx].y*vh, 3, 0, 2*Math.PI);
                overlayCtx.fill();
            }
            overlayCtx.fillStyle = 'rgba(255, 100, 100, 0.4)';
            for (const idx of [...LEFT_EAR_REGION, ...RIGHT_EAR_REGION]) {
                overlayCtx.beginPath();
                overlayCtx.arc(landmarks[idx].x*vw, landmarks[idx].y*vh, 3, 0, 2*Math.PI);
                overlayCtx.fill();
            }
            overlayCtx.fillStyle = 'rgba(255, 255, 0, 0.4)';
            for (const idx of JAWLINE) {
                overlayCtx.beginPath();
                overlayCtx.arc(landmarks[idx].x*vw, landmarks[idx].y*vh, 2, 0, 2*Math.PI);
                overlayCtx.fill();
            }
        }

        if (isRecording) {
            processRecordingFrame(bbox, landmarks, vw, vh);
        }
    } else if (isRecording) {
        sessionTrajectory.push({
            frameIdx: sessionTrajectory.length,
            timestamp: (performance.now() - sessionStartTime) / 1000.0,
            faceDetected: false,
        });
    }

    animFrameId = requestAnimationFrame(detectLoop);
}

function landmarksToBbox(landmarks, w, h) {
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const lm of landmarks) {
        const x = lm.x * w, y = lm.y * h;
        if (x < minX) minX = x; if (y < minY) minY = y;
        if (x > maxX) maxX = x; if (y > maxY) maxY = y;
    }
    const pad = Math.max(maxX - minX, maxY - minY) * 0.05;
    return {
        x: Math.max(0, minX - pad), y: Math.max(0, minY - pad),
        w: Math.min(w, maxX - minX + 2*pad), h: Math.min(h, maxY - minY + 2*pad),
    };
}

// ============================================================
// Recording Logic
// ============================================================
function processRecordingFrame(bbox, landmarks, imgW, imgH) {
    const state = fagrTracker.update(bbox);

    const row = {
        frameIdx: sessionTrajectory.length,
        timestamp: (performance.now() - sessionStartTime) / 1000.0,
        faceDetected: true,
        bboxX: Math.round(bbox.x), bboxY: Math.round(bbox.y),
        bboxW: Math.round(bbox.w), bboxH: Math.round(bbox.h),
        area: Math.round(bbox.w * bbox.h),
        areaRatio: state.areaRatio,
        subBboxDiff: state.subBboxDiff,
        estimatedDzCm: state.estimatedDzCm,
        direction: state.direction,
        areaVelocity: state.areaVelocity,
        tier1Score: scoreTier1(state),
    };

    if (tier2Enabled) {
        if (!startLandmarks) startLandmarks = landmarks.slice();
        endLandmarks = landmarks.slice();
    }

    if (!startFrame) startFrame = captureFrameAsDataURL();
    endFrame = captureFrameAsDataURL();

    // Compute Tier 2 features if enough motion
    let tier2Features = null;
    if (tier2Enabled && startLandmarks && endLandmarks && state.nFrames >= 10) {
        tier2Features = landmarkExtractor.extract(startLandmarks, endLandmarks, imgW, imgH);
        row.fnus = tier2Features.fnus;
        row.cds = tier2Features.cds;
        row.dms = tier2Features.dms;
        row.sos = tier2Features.sos;
    }

    sessionTrajectory.push(row);
    updateHUD(state, tier2Features);

    // Update progress bar
    const progress = Math.min(Math.abs(state.estimatedDzCm) / targetDzCm, 1.0);
    document.getElementById('progress-bar').style.width = (progress * 100) + '%';
    document.getElementById('progress-text').textContent =
        Math.abs(state.estimatedDzCm).toFixed(1) + ' / ' + targetDzCm + ' cm';

    // Auto-stop
    const elapsed = (performance.now() - sessionStartTime) / 1000.0;
    if (Math.abs(state.estimatedDzCm) >= targetDzCm || elapsed >= maxDurationSec) {
        finishSession(state, tier2Features);
    }
}

function updateHUD(state, tier2Features) {
    document.getElementById('hud-area').textContent = state.areaRatio.toFixed(4);
    document.getElementById('hud-subbbox').textContent = state.subBboxDiff.toFixed(4);
    document.getElementById('hud-dz').textContent = state.estimatedDzCm.toFixed(1) + ' cm';
    document.getElementById('hud-dir').textContent = state.direction;

    const t1 = scoreTier1(state);
    document.getElementById('hud-t1').textContent = t1 !== null ? t1.toFixed(3) : '-';

    if (tier2Features) {
        document.getElementById('hud-tier').textContent = 'Tier 2';
        document.getElementById('hud-fnus').textContent = tier2Features.fnus.toFixed(4);
        document.getElementById('hud-cds').textContent = tier2Features.cds.toFixed(5);
        document.getElementById('hud-dms').textContent = tier2Features.dms.toFixed(4);
        document.getElementById('hud-sos').textContent =
            tier2Features.sos !== null ? tier2Features.sos.toFixed(4) : 'N/A';
    } else {
        document.getElementById('hud-tier').textContent = state.nFrames >= 5 ? 'Tier 1' : '-';
    }
}

function captureFrameAsDataURL() {
    const c = document.createElement('canvas');
    c.width = videoEl.videoWidth;
    c.height = videoEl.videoHeight;
    c.getContext('2d').drawImage(videoEl, 0, 0);
    return c.toDataURL('image/png');
}

// ============================================================
// Session Management
// ============================================================
function startSession() {
    currentSessionIdx++;
    fagrTracker = new FAGRTracker(120);
    sessionTrajectory = [];
    startLandmarks = null;
    endLandmarks = null;
    startFrame = null;
    endFrame = null;
    isRecording = true;
    sessionStartTime = performance.now();

    document.getElementById('session-info').textContent =
        '\uC138\uC158 ' + currentSessionIdx + '/' + totalSessions + ' | \uC720\uD615: ' + collectType;
    document.getElementById('btn-start').style.display = 'none';
    document.getElementById('btn-skip').style.display = 'inline-block';
    document.getElementById('btn-stop').style.display = 'inline-block';
    document.getElementById('guide').textContent = '\uCE74\uBA54\uB77C\uC5D0 \uCC9C\uCC9C\uD788 \uB2E4\uAC00\uAC00\uC138\uC694 \u2192\u2192\u2192';
    document.getElementById('guide').style.color = '#4ade80';

    var hudIds = ['hud-area','hud-subbbox','hud-dz','hud-dir','hud-tier','hud-t1',
                  'hud-fnus','hud-cds','hud-dms','hud-sos'];
    hudIds.forEach(function(id) { document.getElementById(id).textContent = '-'; });
    document.getElementById('progress-bar').style.width = '0%';
    document.getElementById('progress-text').textContent = '0%';
}
window.startSession = startSession;

function finishSession(finalState, tier2Features) {
    isRecording = false;

    const imgW = videoEl.videoWidth, imgH = videoEl.videoHeight;
    const ppldFeatures = {
        fagrAreaRatio: finalState.areaRatio,
        fagrSubBboxDiff: finalState.subBboxDiff,
        fagrEstimatedDzCm: finalState.estimatedDzCm,
        fagrDirection: finalState.direction,
        fagrNFrames: finalState.nFrames,
        tier1Score: scoreTier1(finalState),
        tier2Activated: finalState.sufficientForTier2,
    };

    if (tier2Enabled && startLandmarks && endLandmarks) {
        const feats = landmarkExtractor.extract(startLandmarks, endLandmarks, imgW, imgH);
        ppldFeatures.fnus = feats.fnus;
        ppldFeatures.cds = feats.cds;
        ppldFeatures.dms = feats.dms;
        ppldFeatures.sos = feats.sos;
        ppldFeatures.tier2Score = scoreTier2(finalState, feats.fnus, feats.cds, feats.dms, feats.sos);
    }

    const sessionData = {
        sessionId: currentSessionIdx,
        collectType: collectType,
        tier2Enabled: tier2Enabled,
        resolution: imgW + 'x' + imgH,
        durationMs: performance.now() - sessionStartTime,
        totalFrames: sessionTrajectory.length,
        ppldFeatures: ppldFeatures,
        trajectory: sessionTrajectory,
        createdAt: new Date().toISOString(),
        startFrame: startFrame,
        endFrame: endFrame,
    };

    collectedSessions.push(sessionData);

    document.getElementById('guide').textContent =
        '\u2713 \uC644\uB8CC! dZ=' + Math.abs(finalState.estimatedDzCm).toFixed(1) + 'cm, ' +
        sessionTrajectory.length + '\uD504\uB808\uC784';
    document.getElementById('guide').style.color = '#fbbf24';

    if (currentSessionIdx >= totalSessions) {
        setTimeout(showDownload, 1500);
    } else {
        document.getElementById('btn-start').textContent = '\uB2E4\uC74C \uC138\uC158';
        document.getElementById('btn-start').style.display = 'inline-block';
        document.getElementById('btn-skip').style.display = 'none';
    }
}

function skipSession() {
    isRecording = false;
    currentSessionIdx--;
    document.getElementById('guide').textContent = '\uAC74\uB108\uB700';
    document.getElementById('guide').style.color = '#f87171';
    document.getElementById('btn-start').textContent = '\uB2E4\uC2DC \uC2DC\uC791';
    document.getElementById('btn-start').style.display = 'inline-block';
    document.getElementById('btn-skip').style.display = 'none';
}
window.skipSession = skipSession;

function stopCollection() {
    isRecording = false;
    if (collectedSessions.length > 0) {
        showDownload();
    } else {
        location.reload();
    }
}
window.stopCollection = stopCollection;

function showDownload() {
    document.getElementById('camera-screen').style.display = 'none';
    document.getElementById('download-screen').style.display = 'flex';

    // Build summary using safe DOM methods (no innerHTML)
    var summaryEl = document.getElementById('summary');
    while (summaryEl.firstChild) summaryEl.removeChild(summaryEl.firstChild);

    var p1 = document.createElement('p');
    p1.textContent = collectedSessions.length + '\uAC1C \uC138\uC158 \uC218\uC9D1 \uC644\uB8CC';
    summaryEl.appendChild(p1);

    var p2 = document.createElement('p');
    p2.textContent = '\uC720\uD615: ' + collectType + ' | Tier 2: ' + (tier2Enabled ? 'ON' : 'OFF');
    summaryEl.appendChild(p2);

    var dzValues = collectedSessions.map(function(s) { return Math.abs(s.ppldFeatures.fagrEstimatedDzCm); });
    var arValues = collectedSessions.map(function(s) { return s.ppldFeatures.fagrAreaRatio; });

    var detailP = document.createElement('p');
    detailP.className = 'detail';
    var lines = [
        'dZ: ' + Math.min.apply(null, dzValues).toFixed(1) + '~' + Math.max.apply(null, dzValues).toFixed(1) + ' cm',
        'Area ratio: ' + Math.min.apply(null, arValues).toFixed(3) + '~' + Math.max.apply(null, arValues).toFixed(3),
    ];

    if (tier2Enabled) {
        var fnusVals = collectedSessions.map(function(s) { return s.ppldFeatures.fnus; }).filter(function(v) { return v != null; });
        var cdsVals = collectedSessions.map(function(s) { return s.ppldFeatures.cds; }).filter(function(v) { return v != null; });
        if (fnusVals.length > 0) {
            lines.push('FNUS: ' + Math.min.apply(null, fnusVals).toFixed(4) + '~' + Math.max.apply(null, fnusVals).toFixed(4));
            lines.push('CDS: ' + Math.min.apply(null, cdsVals).toFixed(5) + '~' + Math.max.apply(null, cdsVals).toFixed(5));
        }
    }

    lines.forEach(function(line, i) {
        if (i > 0) detailP.appendChild(document.createElement('br'));
        detailP.appendChild(document.createTextNode(line));
    });
    summaryEl.appendChild(detailP);

    // Stop camera
    if (videoEl && videoEl.srcObject) {
        videoEl.srcObject.getTracks().forEach(function(t) { t.stop(); });
    }
    if (animFrameId) cancelAnimationFrame(animFrameId);
}

// ============================================================
// Download as ZIP
// ============================================================
async function downloadData() {
    var zip = new JSZip();
    var dirName = collectType;

    for (var s = 0; s < collectedSessions.length; s++) {
        var session = collectedSessions[s];
        var sessionDir = dirName + '/session_' + String(session.sessionId).padStart(4, '0');

        // Metadata (without bulky base64 frames)
        var meta = Object.assign({}, session);
        delete meta.startFrame;
        delete meta.endFrame;
        zip.file(sessionDir + '/ppld_metadata.json', JSON.stringify(meta, null, 2));

        // Trajectory CSV
        if (session.trajectory.length > 0) {
            var headers = Object.keys(session.trajectory[0]);
            var csvLines = [headers.join(',')];
            for (var r = 0; r < session.trajectory.length; r++) {
                var row = session.trajectory[r];
                csvLines.push(headers.map(function(h) {
                    var v = row[h];
                    return v !== null && v !== undefined ? v : '';
                }).join(','));
            }
            zip.file(sessionDir + '/bbox_trajectory.csv', csvLines.join('\n'));
        }

        // Keyframe images
        if (session.startFrame) {
            zip.file(sessionDir + '/keyframes/start.png',
                     session.startFrame.split(',')[1], { base64: true });
        }
        if (session.endFrame) {
            zip.file(sessionDir + '/keyframes/end.png',
                     session.endFrame.split(',')[1], { base64: true });
        }
    }

    var content = await zip.generateAsync({ type: 'blob' });
    var url = URL.createObjectURL(content);
    var a = document.createElement('a');
    a.href = url;
    var dateStr = new Date().toISOString().slice(0, 10);
    a.download = 'ppld_data_' + collectType + '_' + dateStr + '.zip';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
window.downloadData = downloadData;

</script>
